<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>voxzymi</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { text-align: center; }
    </style>
</head>
<body>
    <div class="loader">
        <p id="status">Generating Hardware ID...</p>
    </div>

    <script>
        async function getStableFingerprint() {
            // 1. Check if we already have one saved for this device
            let savedFp = localStorage.getItem('vox_fp');
            if (savedFp) return savedFp;

            // 2. Otherwise, generate a new hardware-based hash
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "16px 'Arial'";
            ctx.fillText("voxzymi_hardware_v1", 2, 2);
            
            // Collect hardware signals
            const signals = [
                canvas.toDataURL(), // GPU Rendering
                navigator.userAgent, // Browser version
                screen.width + 'x' + screen.height, // Resolution
                navigator.hardwareConcurrency // CPU Cores
            ];
            
            const str = signals.join('###');
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            const finalFp = Math.abs(hash).toString(16);
            
            // 3. Save it forever on this device
            localStorage.setItem('vox_fp', finalFp);
            return finalFp;
        }

        async function startLogin() {
            const statusText = document.getElementById('status');
            const urlParams = new URLSearchParams(window.location.search);
            
            // Handle return from Worker
            const finishId = urlParams.get('finish_login');
            if (finishId) {
                document.cookie = `id=${finishId}; Path=/; Max-Age=86400; SameSite=Strict; Secure`;
                window.location.href = "/";
                return;
            }

            const token = urlParams.get('token');
            if (!token) {
                statusText.innerText = "❌ No token found.";
                return;
            }

            const fp = await getStableFingerprint();
            const workerURL = "https://voxzymi-auth.andrewrobloxvapeconfigs.workers.dev/verify";
            
            window.location.href = `${workerURL}?token=${token}&fp=${fp}`;
        }
        window.onload = startLogin;
    </script>
</body>
</html>
