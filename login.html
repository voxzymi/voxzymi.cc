<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... | Voxzymi</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #5865F2; /* Discord Blue */
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader">
        <div class="spinner"></div>
        <p id="status">Verifying device hardware...</p>
    </div>

    <script>
        // 1. Generate Hardware Fingerprint
        async function getFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.fillText("voxzymi_auth_v1", 2, 2);
                const data = canvas.toDataURL();
                
                let hash = 0;
                for (let i = 0; i < data.length; i++) {
                    hash = ((hash << 5) - hash) + data.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash).toString(16);
            } catch (e) {
                // Fallback for browsers that block canvas (like Brave)
                return "fp-fallback-" + Math.floor(Math.random() * 1000000);
            }
        }

        async function startLogin() {
    const statusText = document.getElementById('status');
    const urlParams = new URLSearchParams(window.location.search);
    
    // SCENARIO 2: Returning from Worker to set the cookie
    const finishId = urlParams.get('finish_login');
    if (finishId) {
        statusText.innerText = "Finalizing session...";
        // Set the cookie directly on voxzymi.cc
        document.cookie = `id=${finishId}; Path=/; Max-Age=86400; SameSite=Strict; Secure`;
        
        // Wait a tiny bit and go to homepage
        setTimeout(() => {
            window.location.href = "https://voxzymi.cc/";
        }, 500);
        return;
    }

    // SCENARIO 1: First arrival from Discord
    const token = urlParams.get('token');
    if (!token) {
        statusText.innerText = "❌ Error: No login token found.";
        return;
    }

    const fp = await getFingerprint();
    const workerURL = "https://voxzymi-auth.andrewrobloxvapeconfigs.workers.dev/verify";
    
    // Send to worker, which will then redirect back here with ?finish_login=...
    window.location.href = `${workerURL}?token=${token}&fp=${fp}`;
}

        // Run on page load
        window.onload = startLogin;
    </script>
</body>
</html>
